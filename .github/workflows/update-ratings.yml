name: Update Housing Ratings

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write
  actions: write

jobs:
  update-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Fetch ratings from Google Sheets
        run: node scripts/fetch-ratings.js

      - name: Commit and push if data changed
        id: commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/housing-ratings.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update housing ratings"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Trigger the deploy workflow so the site rebuilds with the new data.
      # (A GITHUB_TOKEN push cannot trigger other workflows automatically.)
      - name: Trigger deploy workflow
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
