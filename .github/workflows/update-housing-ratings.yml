name: Update Housing Ratings

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || true
      - name: Fetch housing ratings from Google Sheets
        run: node scripts/fetch-housing-ratings.js
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data/housing-ratings.json
          git commit -m "Update housing ratings" || exit 0
          git push
