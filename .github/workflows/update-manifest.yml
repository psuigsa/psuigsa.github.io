name: Update Content Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'content/events/*.md'
      - 'content/board/*.md'
      - 'content/board/*.json'
      - 'content/resources/*.md'

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update content manifests
        run: |
          node scripts/generate-manifests.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add content/events/manifest.json content/board/manifest.json content/resources/manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update content manifests" && git push)
